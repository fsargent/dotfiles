add_newline = false
# Two-line prompt: git info first, path second
format = """$git_branch$git_status$nodejs$python$golang$aws
$directory$character"""
palette = "catppuccin_mocha"
command_timeout = 500

# Reduce process spawning
[status]
disabled = true

[time]
disabled = true

[git_status]
# Disable features that require extra git processes
stashed = ""
ahead = "â‡¡${count}"
behind = "â‡£${count}"
diverged = "â‡•â‡¡${ahead_count}â‡£${behind_count}"

[character]
vicmd_symbol = '[âžœ](bold green)'
success_symbol = '[âžœ](bold green)'

[directory.substitutions]
'~/tests/starship-custom' = 'work-project'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '

[aws]
format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
disabled = false
style = 'bold blue'
symbol = "îŒ½ "

[golang]
format = '[î˜§ ](bold cyan)'

[kubernetes]
symbol = 'â˜¸ '
disabled = true
detect_files = ['Dockerfile']
format = '[$symbol$context( \($namespace\))]($style) '
contexts = [
  #   { context_pattern = "arn:aws:eks:us-west-2:577926974532:cluster/zd-pvc-omer", style = "green", context_alias = "omerxx", symbol = "ïˆ³ " },
]

[docker_context]
disabled = true

[python]
# Disable showing virtual environment names and Python project info
disabled = false
format = ' [î´› $version]($style) '
# Don't show virtual environment name
python_binary = ['python', 'python3', 'python2']
detect_extensions = ['py']
detect_files = [
  'requirements.txt',
  '.python-version',
  'pyproject.toml',
  'Pipfile',
  'tox.ini',
  'setup.py',
  '__init__.py',
]
detect_folders = []

[package]
# Disable showing package names from package.json, etc.
disabled = true

[conda]
# Disable conda environment display
disabled = true

[nodejs]
# Only show Node version, not project names
format = '[$symbol$version]($style) '
symbol = "ó°Ž™ "
detect_extensions = ['js', 'mjs', 'cjs', 'ts', 'tsx']
detect_files = ['package.json', '.node-version', '.nvmrc']
detect_folders = ['node_modules']

[env_var.MISE_ENV]
# Disable mise environment display completely
disabled = false

[custom.mise]
# Disable any custom mise prompt integration
disabled = true

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
